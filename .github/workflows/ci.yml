name: Firstprint CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run core test suite (55 tests)
        run: npx tsx tests/test-suite.ts

      - name: Run project integration tests (19 tests)
        run: npx tsx tests/test-project.ts

      - name: Run clone detection demo
        run: npx tsx demo/detect-clone.ts

      - name: Run function-level detection
        run: npx tsx demo/function-detect.ts

      - name: Run Python support test
        run: npx tsx demo/python-test.ts

      - name: Test CLI scan
        run: npx tsx packages/cli/src/cli.ts scan packages/core/src

      - name: Test CLI check
        run: npx tsx packages/cli/src/cli.ts check packages/core/src/hash.ts

      - name: Test CLI register
        run: npx tsx packages/cli/src/cli.ts register packages/core/src
