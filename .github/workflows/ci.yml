name: Firstprint CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npx tsx tests/test-suite.ts

      - name: Run clone detection demo
        run: npx tsx demo/detect-clone.ts

      - name: Run function-level detection
        run: npx tsx demo/function-detect.ts

      - name: Run Python support test
        run: npx tsx demo/python-test.ts
